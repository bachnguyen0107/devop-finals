name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint -- --quiet

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devop-final-web:latest
            ${{ secrets.DOCKER_USERNAME }}/devop-final-web:${{ github.sha }}

  deploy:
    name: Continuous Delivery to EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Nếu chưa có thư mục, clone repo về
            if [ ! -d "devop-finals" ]; then
              git clone https://github.com/${{ github.repository }}.git devop-finals
            fi
            cd devop-finals
            git pull origin main || true
            
            # Dọn dẹp docker sạch sẽ để giải phóng dung lượng disk tối đa trước build
            docker-compose down -v 2>/dev/null || true
            docker system prune -af --volumes || true
            docker rmi $(docker images -q) 2>/dev/null || true
            docker volume prune -f || true
            docker network prune -f || true
            df -h
            
            # Tạo file .env từ template và trỏ về mongo container
            cp .env.example .env
            sed -i 's|MONGO_URI=mongodb://localhost:27017/products_db|MONGO_URI=mongodb://mongo:27017/products_db|g' .env
            
            # Build images locally từ Dockerfile và khởi động
            docker-compose up -d --build


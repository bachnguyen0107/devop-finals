services:
  nginx:
    image: nginx:latest
    container_name: devop_midterm_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl/letsencrypt:/etc/letsencrypt:ro
      - ./ssl/certbot:/var/www/certbot:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network

  certbot:
    image: certbot/certbot:latest
    container_name: devop_midterm_certbot
    volumes:
      - ./ssl/letsencrypt:/etc/letsencrypt
      - ./ssl/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet --post-hook \"nginx -s reload\"; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      - nginx

  web:
    image: devop-midterm-web:1.0.0
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/public/uploads
      - logs_data:/app/logs
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      replicas: 3

  mongo:
    image: mongo:6.0
    container_name: devop_midterm_mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: devop_midterm_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - app-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: devop_midterm_cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: devop_midterm_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./prometheus/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongo_data:
  uploads_data:
  logs_data:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge

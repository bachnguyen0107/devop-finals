services:
  nginx:
    image: nginx:latest
    container_name: devop_final_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network

  web:
    build: .
    image: devop-final-web:latest
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/public/uploads
      - logs_data:/app/logs
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      replicas: 3

  mongo:
    image: mongo:6.0
    container_name: devop_final_mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: devop_final_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - app-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: devop_final_cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      # Sửa lỗi: Bỏ dấu gạch chéo cuối cùng để tránh lỗi mkdir trên hệ thống Read-only
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: devop_final_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./prometheus/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongo_data:
  uploads_data:
  logs_data:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge
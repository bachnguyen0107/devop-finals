services:
  nginx:
    image: nginx:latest
    container_name: devop_midterm_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network

  web:
    image: devop-midterm-web:1.0.0
    container_name: devop_midterm_web
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/public/uploads
      - logs_data:/app/logs
    restart: unless-stopped
    networks:
      - app-network

  mongo:
    image: mongo:6.0
    container_name: devop_midterm_mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongo_data:
  uploads_data:
  logs_data:

networks:
  app-network:
    driver: bridge

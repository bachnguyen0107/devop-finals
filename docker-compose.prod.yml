version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: devop_final_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network

  web:
    build: .
    image: devop-final-web:latest
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/public/uploads
      - logs_data:/app/logs
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      replicas: 3

  mongo:
    image: mongo:6.0
    container_name: devop_final_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongo_data:
  uploads_data:
  logs_data:

networks:
  app-network:
    driver: bridge
